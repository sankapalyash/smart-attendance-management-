<!DOCTYPE html>
<html>
<head>

<title>Edit Teacher</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
text-align:center;
}

.container{
width:400px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
margin-top:50px;
box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}

input{
padding:10px;
margin:10px;
width:80%;
font-size:15px;
}

.password-wrapper{
position:relative;
width:100%;
}

.password-wrapper input{
width:80%;
padding-right:40px;
}

.eye-btn{
position:absolute;
right:45px;
top:18px;
cursor:pointer;
font-size:18px;
}

button{
padding:10px 20px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

</style>

</head>

<body>

<div class="container">

<h2>Edit Teacher</h2>

<form action="/update_teacher/{{ teacher.id }}" method="POST">

<input 
type="text" 
name="username" 
value="{{ teacher.username }}" 
placeholder="Teacher Username"
required
>

<div class="password-wrapper">

<input 
type="password" 
id="password" 
name="password" 
value="{{ teacher.password }}" 
placeholder="Teacher Password"
required
>

<span class="eye-btn" onclick="togglePassword()">👁</span>

</div>

<br>

<button type="submit">Update Teacher</button>

</form>

</div>


<script>

function togglePassword(){

var passwordField = document.getElementById("password");

if(passwordField.type === "password"){
passwordField.type = "text";
}
else{
passwordField.type = "password";
}

}

</script>

</body>

</html>
