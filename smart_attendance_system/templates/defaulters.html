<!DOCTYPE html>
<html>

<head>
<title>Defaulter List</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
text-align:center;
}

.container{
width:800px;
margin:auto;
margin-top:40px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border:1px solid #ddd;
}

th{
background:#333;
color:white;
}

.download-btn{
padding:10px 18px;
background:#3498db;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
margin-top:15px;
}

.download-btn:hover{
background:#217dbb;
}

</style>

</head>

<body>

<div class="container">

<h2>Defaulter List (Attendance < 75%)</h2>

<br>

<a href="/download_defaulters">
<button class="download-btn">Download Defaulter List</button>
</a>

<table>

<tr>
<th>Roll No</th>
<th>Name</th>
<th>Attendance %</th>
<th>Mobile</th>
</tr>

{% for s in students %}

<tr>

<td>{{ s.roll }}</td>
<td>{{ s.name }}</td>
<td>{{ s.percentage }}</td>
<td>{{ s.mobile }}</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
